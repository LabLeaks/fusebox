version: 2

project_name: fusebox

builds:
  - id: work
    binary: work
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    tags:
      - embed_server
    hooks:
      pre:
        - cmd: sh -c "GOOS=linux GOARCH=arm64 go build -o internal/embed/work-linux-arm64 . && GOOS=linux GOARCH=amd64 go build -o internal/embed/work-linux-amd64 ."

archives:
  - id: binaries
    format: binary
    name_template: "work-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: lableaks
    name: fusebox

changelog:
  sort: asc
